<!doctype html>
<html>
  <head>
    <title>Prosp Connector</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 280px;
        background: #fff;
      }

      .header {
        background: linear-gradient(135deg, #7c3aed, #a855f7);
        padding: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .header-logo {
        width: 32px;
        height: 32px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      .header-title {
        color: white;
        font-weight: 700;
        font-size: 15px;
      }
      .header-sub {
        color: rgba(255, 255, 255, 0.7);
        font-size: 11px;
        margin-top: 1px;
      }

      .status-bar {
        padding: 10px 16px;
        background: #f8f9ff;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #6b7280;
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #10b981;
        animation: pulse 2s infinite;
      }
      .status-dot.inactive {
        background: #9ca3af;
        animation: none;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .section {
        padding: 12px 16px;
        border-bottom: 1px solid #f3f4f6;
      }
      .section-label {
        font-size: 10px;
        font-weight: 700;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 8px;
      }

      .btn {
        width: 100%;
        padding: 10px 14px;
        border: none;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.15s;
        margin-bottom: 6px;
      }
      .btn:last-child {
        margin-bottom: 0;
      }
      .btn-primary {
        background: linear-gradient(135deg, #7c3aed, #a855f7);
        color: white;
      }
      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-secondary {
        background: #f3f4f6;
        color: #374151;
      }
      .btn-secondary:hover {
        background: #e5e7eb;
      }
      .btn-danger {
        background: #fef2f2;
        color: #dc2626;
      }
      .btn-danger:hover {
        background: #fee2e2;
      }

      .btn-icon {
        font-size: 15px;
      }

      .footer {
        padding: 10px 16px;
        text-align: center;
        font-size: 11px;
        color: #9ca3af;
      }
      .footer a {
        color: #7c3aed;
        text-decoration: none;
      }

      #statusText {
        font-weight: 500;
        color: #374151;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-logo">🔗</div>
      <div>
        <div class="header-title">Prosp Connector</div>
        <div class="header-sub">LinkedIn Automation</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Checking connection...</span>
    </div>

    <div class="section">
      <div class="section-label">Single Profile</div>
      <button class="btn btn-primary" id="connectBtn">
        <span class="btn-icon">🔗</span>
        Connect Profile
      </button>
    </div>

    <div class="section">
      <div class="section-label">Bulk Actions</div>
      <button class="btn btn-primary" id="bulkConnectBtn">
        <span class="btn-icon">⚡</span>
        Bulk Connect
      </button>
      <button class="btn btn-secondary" id="openDashboard">
        <span class="btn-icon">📊</span>
        Open Dashboard
      </button>
    </div>

    <div class="footer">
      <a href="#" id="openSettings">Settings</a> ·
      <a href="#" id="openHelp">Help</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
